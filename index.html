<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.Nuch SmartCom - Scan Class Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">T.Nuch SmartCom</span>
            <span class="text-white-50">ครูนุช | ออนไลน์</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row g-3 mb-3">
            <div class="col-4"><div class="card card-btn bg-p6 text-center p-3" onclick="selectClass('A1')">ปวช.1</div></div>
            <div class="col-4"><div class="card card-btn bg-m1 text-center p-3" onclick="selectClass('A2')">ปวช.2</div></div>
            <div class="col-4"><div class="card card-btn bg-m3 text-center p-3" onclick="selectClass('A3')">ปวช.3</div></div>
        </div>

        <div class="text-center mb-3">
            <div id="selected-class" class="status-badge bg-secondary">ยังไม่ได้เลือกห้องเรียน</div>
        </div>

        <div class="main-card mb-4 overflow-hidden">
            <div class="d-flex border-bottom">
                <div id="tab-att" class="flex-fill text-center p-3 fw-bold bg-light text-primary border-end" style="cursor:pointer;" onclick="switchMode('attendance')">
                    📌 โหมดเช็คชื่อ
                </div>
                <div id="tab-score" class="flex-fill text-center p-3 fw-bold text-muted" style="cursor:pointer;" onclick="switchMode('score')">
                    📝 โหมดให้คะแนนงาน
                </div>
            </div>

            <div class="p-4">
                <div id="score-form" style="display: none;" class="mb-3 animate-fadeIn">
                    <label class="fw-bold text-primary mb-2">ตั้งค่าการบันทึกคะแนน</label>
                    <div class="row g-2">
                        <div class="col-md-7">
                            <select id="assignment-select" class="form-select border-primary">
                                <option value="">-- กำลังโหลดใบงาน... --</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="number" id="input-score" class="form-control border-primary" placeholder="คะแนน">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-secondary w-100" onclick="clearScore()" title="ล้างค่า">
                                <i class="bi bi-eraser"></i> ล้าง
                            </button>
                        </div>
                    </div>
                    <small class="text-muted mt-1 d-block">*ระบบจะบันทึกคะแนนนี้ให้กับเด็กที่สแกนทุกคนในโหมดนี้</small>
                </div>

                <h5 class="text-primary fw-bold mb-3 text-center" id="mode-title">📷 สแกนเช็คชื่อเข้าเรียน</h5>
                <div id="reader" class="mx-auto mb-3" style="max-width: 400px; overflow: hidden; border-radius: 15px;"></div>
                <div id="status" class="status-badge bg-secondary mb-3">สถานะกล้อง: พร้อมใช้งาน</div>
                
                <div class="text-center">
                    <button class="btn btn-primary px-4 me-2" onclick="startCamera()">เปิดกล้อง</button>
                    <button class="btn btn-outline-danger" onclick="stopCamera()">ปิดกล้อง</button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-4" id="dashboard-section">
                <div class="main-card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold text-primary mb-0"><i class="bi bi-table"></i> บันทึกการเข้าเรียนวันนี้</h6>
                        <button class="btn btn-sm btn-success px-3" onclick="exportToExcel()">
                            <i class="bi bi-file-earmark-excel"></i> ส่งออก Excel
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="att-table-main">
                            <thead class="table-light">
                                <tr>
                                    <th>ชื่อ-นามสกุล</th>
                                    <th>เวลา</th>
                                    <th>สถานะ</th>
                                </tr>
                            </thead>
                            <tbody id="att-table">
                                <tr>
                                    <td colspan="3" class="text-center text-muted">กรุณาเลือกห้องเรียนเพื่อดูข้อมูล</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div> <audio id="beep-sound" src="https://www.soundjay.com/button/beep-07.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
