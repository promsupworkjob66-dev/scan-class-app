<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.Nuch SmartCom - Scan Class Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">T.Nuch SmartCom</span>
            <span class="text-white-50">ครูนุช | ออนไลน์</span>
        </div>
    </nav>

    <div class="container mt-4">
       <div class="row g-3 mb-2">
        <div class="col-4"><div class="card card-btn bg-p6 text-center p-3" style="cursor:pointer;" onclick="selectClass('A1')">ปวช.1</div></div>
        <div class="col-4"><div class="card card-btn bg-m1 text-center p-3" style="cursor:pointer;" onclick="selectClass('A2')">ปวช.2</div></div>
        <div class="col-4"><div class="card card-btn bg-m3 text-center p-3" style="cursor:pointer;" onclick="selectClass('A3')">ปวช.3</div></div>
        </div>

        <div class="text-center mb-3">
            <div id="selected-class" class="status-badge bg-secondary">ยังไม่ได้เลือกห้องเรียน</div>
        </div>

        <div class="main-card p-4 mb-4">
            <h5 class="text-primary fw-bold mb-3 text-center">📷 ระบบสแกนเช็คชื่อ / ส่งงาน</h5>
            <div id="reader" class="mx-auto mb-3" style="max-width: 400px; overflow: hidden; border-radius: 15px;"></div>
            <div id="status" class="status-badge bg-secondary mb-3">สถานะกล้อง: พร้อมใช้งาน</div>
            <div class="text-center">
                <button class="btn btn-primary px-4 me-2" onclick="startCamera()">เปิดกล้อง</button>
                <button class="btn btn-outline-danger" onclick="stopCamera()">ปิดกล้อง</button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-7 mb-4">
                <div class="main-card p-3 h-100">
                    <h6 class="fw-bold border-bottom pb-2">เช็คชื่อนักเรียนล่าสุด (10 คน)</h6>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ชื่อ-นามสกุล</th>
                                    <th>เวลา</th>
                                    <th>สถานะ</th>
                                </tr>
                            </thead>
                            <tbody id="att-table">
                                <tr><td colspan="3" class="text-center text-muted">กรุณาเลือกห้องเรียนด้านบน</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-5 mb-4">
                <div class="main-card p-3 h-100 text-center">
                    <h6 class="fw-bold mb-3">ภาพรวมการเข้าเรียนวันนี้</h6>
                    <div style="position: relative; height:250px;">
                        <canvas id="attendanceChart"></canvas>
                        <div id="total-percent" style="position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: #1e40af;">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
