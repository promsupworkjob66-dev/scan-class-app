<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Class Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* เพิ่ม Style เล็กน้อยเพื่อให้ช่องสแกนดูดีขึ้น */
    #reader {
      width: 100%;
      max-width: 500px;
      margin: 20px auto;
      border: 2px solid #333;
      border-radius: 10px;
      overflow: hidden;
    }
    .menu button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
    .form {
      margin: 20px 0;
      padding: 15px;
      background: #f4f4f4;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div style="text-align: center; padding: 20px;">
    <h1>📱 Scan Class Pro</h1>

    <div class="menu">
      <button onclick="startScan('checkin')">✅ เช็คชื่อ</button>
      <button onclick="startScan('score')">📝 เก็บคะแนน</button>
    </div>

    <div class="form">
      <div>
        <label for="assignment">เลือกงาน:</label>
        <select id="assignment"></select>
      </div>
      
      <div style="margin-top: 10px;">
        <label for="score">คะแนน:</label>
        <input type="number" id="score" placeholder="ใส่คะแนน" value="0">
      </div>
    </div>

    <div id="reader"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
